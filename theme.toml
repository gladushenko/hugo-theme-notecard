# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name        = "Hugo Notecard Project"
license     = "GPL-3.0-only"
licenselink = "https://github.com/gladushenko/hugo-theme-notecard/blob/main/LICENSE"
description = "Readable card-style Hugo theme by Gladushenko for personal blogs, notes, and technical writing"
homepage    = "https://github.com/gladushenko/hugo-theme-notecard"
demosite    = ""

tags = ["blog", "responsive", "clean", "light", "dark", "personal"]

features = [
    "disqus",
    "photoswipe",
    "opengraph",
    "widgets",
    "darkmode",
    "table of contents",
    "search",
]

min_version = "0.157.0"

[author]
    name     = "gladushenko"
    homepage = "https://github.com/gladushenko"
