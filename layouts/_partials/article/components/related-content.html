{{ $related := (.Site.RegularPages.Related .) | first 5 }}
{{ with $related }}
<aside class="related-content">
    <h2 class="section-title">{{ T "article.relatedContent" }}</h2>
    <div class="article-list">
        {{ range . }}
            {{ partial "article-list/default" . }}
        {{ end }}
    </div>
</aside>
{{ end }}
