mainSections   = ["posts"]
rssFullContent = true
favicon        = "img/favicon.png"

[footer]
    since      = 2026
    customText = ""

[sidebar]
    subtitle = "Card-style Hugo theme for technical notes."
    avatar   = "img/avatar.png"

[article]
    headingAnchor = false
    math          = false
    readingTime   = true

    [article.license]
        enabled = false
        default = ""

[widgets]
    homepage = [
        { type = "search" },
    ]
    left = [
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    # See complete configuration in config/_default/params.toml
    enabled  = false
    provider = "disqus"

[colorScheme]
    toggle  = true
    default = "auto"

# GDPR Cookie Consent Configuration
# When enabled, analytics and functional cookies require user consent
[cookies]
    enabled = false

    [cookies.categories]
        analytics  = true
        functional = true
