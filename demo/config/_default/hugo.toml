baseURL                = "https://gladushenko.github.io/hugo-theme-notecard/"
locale                 = "en-us"
title                  = "Hugo Notecard Project"
theme                  = "hugo-theme-notecard"
themesDir              = "../.."
# Theme i18n support
# See i18n folder for available languages
defaultContentLanguage = "en"
# Set hasCJKLanguage to true if DefaultContentLanguage is a CJK language
# This will make .Summary and .WordCount behave correctly
hasCJKLanguage         = false

[pagination]
    pagerSize = 5

[permalinks]
    posts = "/p/:slug/"
    page = "/:slug/"

[services.disqus]
    shortname = ""
